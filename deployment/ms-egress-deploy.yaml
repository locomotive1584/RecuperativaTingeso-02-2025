apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-microservice-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: egress-microservice-deployment
  template:
    metadata:
      labels:
        app: egress-microservice-deployment
    spec:
      containers:
        - name: egress-microservice-container
          image: locomotive1584/egress-microservice:latest
          ports:
            - containerPort: 8001
          env:
            - name: SPRING_CLOUD_CONFIG_URI
              value: http://config:8888
            - name: POSTGRES_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: postgres-config-map
                  key: POSTGRES_DB_HOST
            - name: POSTGRES_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: postgres-config-map
                  key: POSTGRES_DB_EGRESS
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: egress-microservice
spec:
  selector:
    app: egress-microservice-deployment
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP