apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-deployment
  labels:
    app: config-deployment
spec:
  selector:
    matchLabels:
      app: config-deployment
  replicas: 1
  template:
    metadata:
      labels:
        app: config-deployment
    spec:
      containers:
        - name: config
          image: locomotive1584/config:latest
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "native"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config  # Montar configuración en el contenedor
      volumes:
        - name: config-volume
          configMap:
            name: configserver-config
---
apiVersion: v1
kind: Service
metadata:
  name: config
  labels:
    app: config
spec:
  selector:
    app: config-deployment
  ports:
    - protocol: TCP
      port: 8888
      targetPort: 8888
  type: ClusterIP